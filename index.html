<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="لعبة XO متعددة اللاعبين في الوقت الفعلي - تحدي أصدقائك الآن">
    <meta name="theme-color" content="#1a1a2e">
    <title>XO Arena | لعبة الأصدقاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .app-container {
            width: 100%;
            max-width: 580px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .game-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .game-title {
            font-size: 2.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #6b7280;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .room-section {
            background: #f8f9fc;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6b7280;
            margin-bottom: 16px;
            text-align: center;
        }

        .room-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .room-input-wrapper {
            flex: 1;
            position: relative;
        }

        .room-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 20px;
            font-size: 1.2rem;
            font-family: 'Inter', monospace;
            font-weight: 700;
            text-align: center;
            letter-spacing: 4px;
            transition: all 0.2s ease;
            background: white;
            direction: ltr;
        }

        .room-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .room-code-display {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            padding: 16px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 24px;
            border: 2px solid #667eea30;
        }

        .room-code-display span {
            color: #6b7280;
            font-size: 0.85rem;
        }

        .room-code-display strong {
            color: #667eea;
            font-size: 1.8rem;
            font-family: monospace;
            letter-spacing: 6px;
            display: inline-block;
            margin-top: 8px;
            font-weight: 800;
        }

        .players-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 28px;
        }

        .player-card {
            background: #f8f9fc;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .player-card.active {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            border-color: #667eea;
            transform: scale(1.02);
        }

        .player-card.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .player-symbol {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .player-name {
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .player-status {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        .status-ready {
            background: #10b98120;
            color: #059669;
        }

        .status-waiting {
            background: #f59e0b20;
            color: #d97706;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }

        .cell {
            aspect-ratio: 1;
            background: #f8f9fc;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .cell:hover:not(.disabled) {
            background: #e5e7eb;
            transform: scale(1.02);
        }

        .cell:active:not(.disabled) {
            transform: scale(0.96);
        }

        .cell.disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .cell.x-move {
            color: #667eea;
        }

        .cell.o-move {
            color: #f59e0b;
        }

        .cell.winner-highlight {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .status-section {
            background: #f8f9fc;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
        }

        .game-status {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .turn-indicator {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            padding: 8px 20px;
            background: white;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .waiting-area {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border-radius: 24px;
            padding: 48px 32px;
            text-align: center;
            margin-bottom: 24px;
        }

        .waiting-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #fde68a;
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .waiting-text {
            color: #92400e;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 12px;
        }

        .waiting-hint {
            color: #b45309;
            font-size: 0.85rem;
        }

        .reset-btn {
            width: 100%;
            background: linear-gradient(135deg, #6b7280, #4b5563);
            color: white;
            justify-content: center;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(107, 114, 128, 0.3);
        }

        .leave-btn {
            width: 100%;
            margin-top: 12px;
            background: #ef4444;
            color: white;
            justify-content: center;
        }

        .leave-btn:hover {
            background: #dc2626;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1f2937;
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 1000;
            transition: transform 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #fff;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @media (max-width: 500px) {
            .game-card {
                padding: 20px;
            }
            
            .cell {
                font-size: 2.5rem;
            }
            
            .room-controls {
                flex-direction: column;
            }
            
            .btn {
                padding: 12px 20px;
            }
            
            .room-code-display strong {
                font-size: 1.2rem;
                letter-spacing: 3px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="game-card">
            <div class="game-header">
                <h1 class="game-title">⚡ XO ARENA</h1>
                <p class="subtitle">تحدى أصدقائك في لعبة الذكاء السريعة</p>
            </div>

            <div id="lobbyView">
                <div class="room-section">
                    <div class="section-label">🎮 غرفة اللعبة</div>
                    <div class="room-controls">
                        <div class="room-input-wrapper">
                            <input type="text" id="roomCodeInput" class="room-input" placeholder="أدخل رمز الغرفة" maxlength="6" autocomplete="off">
                        </div>
                        <button id="joinGameBtn" class="btn btn-primary">🎯 انضم للغرفة</button>
                    </div>
                    <div class="room-controls">
                        <button id="createGameBtn" class="btn btn-secondary" style="width: 100%;">✨ إنشاء غرفة جديدة</button>
                    </div>
                </div>
            </div>

            <div id="gameView" style="display: none;">
                <div class="room-code-display">
                    <span>🏷️ رمز الغرفة</span>
                    <br>
                    <strong id="roomCodeValue">------</strong>
                </div>
                
                <div class="players-section">
                    <div class="player-card" id="playerXCard">
                        <div class="player-symbol">❌</div>
                        <div class="player-name" id="playerXName">اللاعب X</div>
                        <div class="player-status" id="playerXStatus">جاري...</div>
                    </div>
                    <div class="player-card" id="playerOCard">
                        <div class="player-symbol">⭕</div>
                        <div class="player-name" id="playerOName">اللاعب O</div>
                        <div class="player-status" id="playerOStatus">جاري...</div>
                    </div>
                </div>

                <div id="waitingContainer" style="display: none;">
                    <div class="waiting-area">
                        <div class="waiting-spinner"></div>
                        <div class="waiting-text">⏳ انتظار انضمام اللاعب الثاني...</div>
                        <div class="waiting-hint">💡 شارك رمز الغرفة مع صديقك للعب معاً</div>
                    </div>
                </div>

                <div id="boardContainer" style="display: none;">
                    <div class="game-board" id="gameBoard"></div>
                    
                    <div class="status-section">
                        <div class="game-status" id="gameStatus">🎮 جارية</div>
                        <div class="turn-indicator" id="turnIndicator">
                            <span>⚡ دور</span>
                            <strong id="turnSymbol">X</strong>
                        </div>
                    </div>

                    <button id="resetGameBtn" class="btn reset-btn">🔄 بدء جولة جديدة</button>
                    <button id="leaveGameBtn" class="btn leave-btn">🚪 مغادرة الغرفة</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove, get, child } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDynVoQRSD9icEcXfEz8Fdjms-sNd9gz9Y",
            authDomain: "xogame-a4254.firebaseapp.com",
            projectId: "xogame-a4254",
            storageBucket: "xogame-a4254.firebasestorage.app",
            messagingSenderId: "961834791643",
            appId: "1:961834791643:web:4916dd3cd8fa577d2f92fe",
            measurementId: "G-SESYRWKR5J"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const dbRef = ref(database);

        // Game State
        let currentRoom = null;
        let currentPlayerId = null;
        let mySymbol = null;
        let gameSubscription = null;
        let currentGameData = null;
        
        // DOM Elements
        const lobbyView = document.getElementById('lobbyView');
        const gameView = document.getElementById('gameView');
        const roomCodeInput = document.getElementById('roomCodeInput');
        const joinGameBtn = document.getElementById('joinGameBtn');
        const createGameBtn = document.getElementById('createGameBtn');
        const roomCodeValue = document.getElementById('roomCodeValue');
        const waitingContainer = document.getElementById('waitingContainer');
        const boardContainer = document.getElementById('boardContainer');
        const gameBoard = document.getElementById('gameBoard');
        const gameStatus = document.getElementById('gameStatus');
        const turnIndicator = document.getElementById('turnIndicator');
        const turnSymbol = document.getElementById('turnSymbol');
        const resetGameBtn = document.getElementById('resetGameBtn');
        const leaveGameBtn = document.getElementById('leaveGameBtn');
        const playerXName = document.getElementById('playerXName');
        const playerOName = document.getElementById('playerOName');
        const playerXStatus = document.getElementById('playerXStatus');
        const playerOStatus = document.getElementById('playerOStatus');
        const playerXCard = document.getElementById('playerXCard');
        const playerOCard = document.getElementById('playerOCard');
        const loadingOverlay = document.getElementById('loadingOverlay');

        let boardCells = [];

        // Helper Functions
        function showLoading(show) {
            loadingOverlay.style.display = show ? 'flex' : 'none';
        }

        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        function generateRoomCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        function getPlayerId() {
            let id = localStorage.getItem('xo_player_id');
            if (!id) {
                id = 'player_' + Date.now() + '_' + Math.random().toString(36).substring(2);
                localStorage.setItem('xo_player_id', id);
            }
            return id;
        }

        function createBoardUI() {
            gameBoard.innerHTML = '';
            boardCells = [];
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleMove(i));
                gameBoard.appendChild(cell);
                boardCells.push(cell);
            }
        }

        function updateBoardUI(board) {
            board.forEach((value, index) => {
                if (boardCells[index]) {
                    boardCells[index].textContent = value;
                    boardCells[index].classList.remove('x-move', 'o-move', 'winner-highlight');
                    if (value === 'X') boardCells[index].classList.add('x-move');
                    if (value === 'O') boardCells[index].classList.add('o-move');
                }
            });
        }

        function highlightWinningCells(board, winner) {
            if (!winner || winner === 'draw') return;
            
            const winPatterns = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];
            
            for (const pattern of winPatterns) {
                if (board[pattern[0]] === winner && 
                    board[pattern[1]] === winner && 
                    board[pattern[2]] === winner) {
                    pattern.forEach(idx => {
                        if (boardCells[idx]) {
                            boardCells[idx].classList.add('winner-highlight');
                        }
                    });
                    break;
                }
            }
        }

        function checkWinner(board) {
            const winPatterns = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];
            
            for (const pattern of winPatterns) {
                if (board[pattern[0]] && 
                    board[pattern[0]] === board[pattern[1]] && 
                    board[pattern[0]] === board[pattern[2]]) {
                    return board[pattern[0]];
                }
            }
            return board.every(cell => cell !== '') ? 'draw' : null;
        }

        async function handleMove(index) {
            if (!currentGameData || !mySymbol) return;
            if (currentGameData.winner) {
                showToast('🎯 انتهت اللعبة، ابدأ جولة جديدة');
                return;
            }
            if (currentGameData.turn !== mySymbol) {
                showToast('⏳ ليس دورك الآن! انتظر دورك');
                return;
            }
            if (currentGameData.board[index] !== '') {
                showToast('📍 هذه الخانة مشغولة');
                return;
            }
            
            const newBoard = [...currentGameData.board];
            newBoard[index] = mySymbol;
            
            const winner = checkWinner(newBoard);
            
            const updates = {
                board: newBoard,
                turn: mySymbol === 'X' ? 'O' : 'X',
                lastMove: Date.now()
            };
            
            if (winner) {
                updates.winner = winner;
                updates.status = 'finished';
            }
            
            try {
                await update(ref(database, `games/${currentRoom}`), updates);
            } catch (error) {
                console.error('Move error:', error);
                showToast('حدث خطأ، حاول مرة أخرى');
            }
        }

        async function resetCurrentGame() {
            if (!currentRoom) return;
            
            showLoading(true);
            const resetData = {
                board: ['', '', '', '', '', '', '', '', ''],
                turn: 'X',
                winner: null,
                status: 'playing',
                lastMove: Date.now()
            };
            
            try {
                await update(ref(database, `games/${currentRoom}`), resetData);
                showToast('🔄 تم بدء جولة جديدة');
            } catch (error) {
                showToast('حدث خطأ');
            } finally {
                showLoading(false);
            }
        }

        async function leaveRoom() {
            if (currentRoom && currentPlayerId && mySymbol) {
                try {
                    const roomRef = ref(database, `games/${currentRoom}`);
                    const updateData = {};
                    
                    if (mySymbol === 'X') {
                        updateData['playerX'] = null;
                    } else {
                        updateData['playerO'] = null;
                    }
                    
                    updateData.status = 'waiting';
                    updateData.winner = null;
                    updateData.turn = 'X';
                    updateData.board = ['', '', '', '', '', '', '', '', ''];
                    
                    await update(roomRef, updateData);
                } catch (error) {
                    console.error('Leave room error:', error);
                }
            }
            
            if (gameSubscription) {
                gameSubscription();
                gameSubscription = null;
            }
            
            currentRoom = null;
            currentGameData = null;
            mySymbol = null;
            lobbyView.style.display = 'block';
            gameView.style.display = 'none';
            waitingContainer.style.display = 'none';
            boardContainer.style.display = 'none';
            showToast('👋 تم مغادرة الغرفة');
        }

        function updateUIWithGameData(data) {
            if (!data) return;
            
            currentGameData = data;
            
            // Update player names and statuses
            if (data.playerX || data.playerO) {
                const isPlayerX = data.playerX === currentPlayerId;
                const isPlayerO = data.playerO === currentPlayerId;
                
                if (data.playerX) {
                    playerXName.textContent = isPlayerX ? 'أنت (X)' : 'الخصم (X)';
                    playerXStatus.textContent = 'متصل';
                    playerXStatus.className = 'player-status status-ready';
                } else {
                    playerXName.textContent = 'اللاعب X';
                    playerXStatus.textContent = 'في الانتظار';
                    playerXStatus.className = 'player-status status-waiting';
                }
                
                if (data.playerO) {
                    playerOName.textContent = isPlayerO ? 'أنت (O)' : 'الخصم (O)';
                    playerOStatus.textContent = 'متصل';
                    playerOStatus.className = 'player-status status-ready';
                } else {
                    playerOName.textContent = 'اللاعب O';
                    playerOStatus.textContent = 'في الانتظار';
                    playerOStatus.className = 'player-status status-waiting';
                }
                
                if (isPlayerX) playerXCard.classList.add('active');
                else playerXCard.classList.remove('active');
                
                if (isPlayerO) playerOCard.classList.add('active');
                else playerOCard.classList.remove('active');
            }
            
            // Update board
            if (data.board) {
                updateBoardUI(data.board);
            }
            
            // Check if both players are present
            const bothPlayersReady = data.playerX && data.playerO;
            
            if (bothPlayersReady) {
                waitingContainer.style.display = 'none';
                boardContainer.style.display = 'block';
                
                if (data.winner) {
                    if (data.winner === 'draw') {
                        gameStatus.textContent = '🤝 تعادل!';
                        turnIndicator.style.display = 'none';
                    } else {
                        const isWinner = (data.winner === 'X' && data.playerX === currentPlayerId) ||
                                       (data.winner === 'O' && data.playerO === currentPlayerId);
                        gameStatus.textContent = isWinner ? '🎉 فوز! تهانينا 🎉' : '💔 خسارة! حاول مرة أخرى';
                        turnIndicator.style.display = 'none';
                        highlightWinningCells(data.board, data.winner);
                    }
                } else {
                    gameStatus.textContent = '🎮 جارية';
                    turnIndicator.style.display = 'inline-flex';
                    turnSymbol.textContent = data.turn;
                    
                    const isMyTurn = data.turn === mySymbol;
                    if (isMyTurn) {
                        turnIndicator.style.background = '#10b98120';
                        turnIndicator.style.color = '#059669';
                        turnIndicator.style.border = '1px solid #10b981';
                    } else {
                        turnIndicator.style.background = '#f59e0b20';
                        turnIndicator.style.color = '#d97706';
                        turnIndicator.style.border = '1px solid #f59e0b';
                    }
                }
            } else {
                waitingContainer.style.display = 'block';
                boardContainer.style.display = 'none';
            }
        }

        async function createGame() {
            showLoading(true);
            const roomCode = generateRoomCode();
            const playerId = getPlayerId();
            
            const gameRef = ref(database, `games/${roomCode}`);
            
            try {
                // Check if room already exists
                const snapshot = await get(child(dbRef, `games/${roomCode}`));
                
                if (snapshot.exists()) {
                    showToast('⚠️ تحدث مشكلة، حاول مرة أخرى');
                    showLoading(false);
                    return;
                }
                
                const gameData = {
                    roomCode: roomCode,
                    playerX: playerId,
                    playerO: null,
                    board: ['', '', '', '', '', '', '', '', ''],
                    turn: 'X',
                    winner: null,
                    status: 'waiting',
                    createdAt: Date.now(),
                    lastMove: Date.now()
                };
                
                await set(gameRef, gameData);
                currentRoom = roomCode;
                currentPlayerId = playerId;
                mySymbol = 'X';
                setupGameListener(roomCode);
                showToast(`✅ تم إنشاء الغرفة بنجاح! الرمز: ${roomCode}`);
            } catch (error) {
                console.error('Create game error:', error);
                showToast('❌ حدث خطأ في إنشاء الغرفة: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        async function joinGame() {
            let roomCode = roomCodeInput.value.trim();
            
            if (!roomCode || roomCode.length !== 6) {
                showToast('⚠️ الرجاء إدخال رمز غرفة صحيح مكون من 6 أرقام');
                return;
            }
            
            if (!/^\d+$/.test(roomCode)) {
                showToast('⚠️ الرمز يجب أن يتكون من أرقام فقط');
                return;
            }
            
            showLoading(true);
            
            try {
                const gameRef = ref(database, `games/${roomCode}`);
                const snapshot = await get(child(dbRef, `games/${roomCode}`));
                
                if (!snapshot.exists()) {
                    showToast('❌ الغرفة غير موجودة. تأكد من الرمز أو قم بإنشاء غرفة جديدة');
                    showLoading(false);
                    return;
                }
                
                const gameData = snapshot.val();
                const playerId = getPlayerId();
                
                console.log('Game data:', gameData);
                console.log('Player ID:', playerId);
                
                // Check if player is already in game
                if (gameData.playerX === playerId) {
                    currentRoom = roomCode;
                    currentPlayerId = playerId;
                    mySymbol = 'X';
                    setupGameListener(roomCode);
                    showToast(`✅ مرحباً بعودتك! تم الانضمام إلى الغرفة ${roomCode}`);
                    showLoading(false);
                    return;
                }
                
                if (gameData.playerO === playerId) {
                    currentRoom = roomCode;
                    currentPlayerId = playerId;
                    mySymbol = 'O';
                    setupGameListener(roomCode);
                    showToast(`✅ مرحباً بعودتك! تم الانضمام إلى الغرفة ${roomCode}`);
                    showLoading(false);
                    return;
                }
                
                // Join as O if spot available
                if (!gameData.playerO && gameData.status !== 'finished') {
                    await update(ref(database, `games/${roomCode}`), {
                        playerO: playerId,
                        status: 'playing'
                    });
                    currentRoom = roomCode;
                    currentPlayerId = playerId;
                    mySymbol = 'O';
                    setupGameListener(roomCode);
                    showToast(`✅ تم الانضمام إلى الغرفة ${roomCode} كلاعب O`);
                } 
                // Join as X if spot available (for edge cases)
                else if (!gameData.playerX && gameData.status !== 'finished') {
                    await update(ref(database, `games/${roomCode}`), {
                        playerX: playerId,
                        status: 'playing'
                    });
                    currentRoom = roomCode;
                    currentPlayerId = playerId;
                    mySymbol = 'X';
                    setupGameListener(roomCode);
                    showToast(`✅ تم الانضمام إلى الغرفة ${roomCode} كلاعب X`);
                } 
                else {
                    showToast('❌ الغرفة ممتلئة. لا يمكن انضمام لاعبين إضافيين');
                }
            } catch (error) {
                console.error('Join game error:', error);
                showToast('❌ حدث خطأ في الانضمام للغرفة: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function setupGameListener(roomCode) {
            if (gameSubscription) {
                gameSubscription();
            }
            
            const gameRef = ref(database, `games/${roomCode}`);
            gameSubscription = onValue(gameRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    showToast('❌ انتهت اللعبة أو تم حذفها');
                    leaveRoom();
                    return;
                }
                
                currentGameData = data;
                updateUIWithGameData(data);
            }, (error) => {
                console.error('Listener error:', error);
                showToast('حدث خطأ في الاتصال');
            });
            
            lobbyView.style.display = 'none';
            gameView.style.display = 'block';
            roomCodeValue.textContent = roomCode;
            createBoardUI();
        }

        // Event Listeners
        createGameBtn.addEventListener('click', createGame);
        joinGameBtn.addEventListener('click', joinGame);
        resetGameBtn.addEventListener('click', resetCurrentGame);
        leaveGameBtn.addEventListener('click', leaveRoom);
        
        roomCodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') joinGame();
        });
        
        roomCodeInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^\d]/g, '').substring(0, 6);
        });
        
        // Initialize
        createBoardUI();
        
        // Test Firebase connection
        async function testConnection() {
            try {
                const testRef = ref(database, 'test');
                await set(testRef, { connected: true, timestamp: Date.now() });
                console.log('Firebase connected successfully');
                showToast('✅ جاهز! يمكنك بدء اللعب');
            } catch (error) {
                console.error('Firebase connection error:', error);
                showToast('⚠️ مشكلة في الاتصال، تأكد من اتصال الإنترنت');
            }
        }
        
        testConnection();
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (currentRoom) {
                leaveRoom();
            }
        });
    </script>
</body>
</html>
